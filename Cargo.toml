[package]
name = "mii-text"
version = "0.1.0"
edition = "2024"

[dependencies]
async-openai = { version = "0.36.0", default-features = false, features = ["rustls", "byot", "chat-completion"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
